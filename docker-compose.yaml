services:
    backend:
        build: ./backend
        container_name: agent-playground-backend
        # Backend is only accessed via nginx reverse proxy (internal Docker network).
        # Uncomment below to expose for debugging: "3001:3001"
        # ports:
        #   - "3001:3001"
        volumes:
            # Persist session data and agents across container restarts
            - ./backend/memory:/app/memory
            - ./backend/agents:/app/agents
            # Allow overriding models.json from the host
            - ./backend/models.json:/app/models.json
        environment:
            - PORT=3001
            - NODE_ENV=production
        # Allow the container to reach host services (e.g. Ollama on localhost:11434)
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        restart: unless-stopped

    frontend:
        build: ./frontend
        container_name: agent-playground-frontend
        ports:
            # Change the left side to use a different host port, e.g. "9090:80"
            - '9090:80'
        depends_on:
            - backend
        restart: unless-stopped

    python-rag:
        build: ./python-rag-service
        container_name: python-rag-service
        ports:
            - '8000:8000'
        environment:
            - MILVUS_HOST=milvus-standalone
            - MILVUS_PORT=19530
            # Ollama is running on the host machine, so use host.docker.internal
            - EMBEDDING_API_URL=http://host.docker.internal:11434/api/embeddings
            - EMBEDDING_MODEL=qwen3-embedding:0.6b
            - SUMMARY_LLM_API_BASE=http://host.docker.internal:11434/v1
            - SUMMARY_LLM_API_KEY=ollama
            - SUMMARY_LLM_MODEL=qwen3:8b
            - CHUNK_METHOD=contextual
            - CHUNK_SIZE=800
            - CHUNK_OVERLAP=150
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        depends_on:
            - standalone
        restart: unless-stopped

    etcd:
        container_name: milvus-etcd
        image: quay.io/coreos/etcd:v3.5.5
        environment:
            - ETCD_AUTO_COMPACTION_MODE=revision
            - ETCD_AUTO_COMPACTION_RETENTION=1000
            - ETCD_QUOTA_BACKEND_BYTES=4294967296
            - ETCD_SNAPSHOT_COUNT=50000
        volumes:
            - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
        command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
        healthcheck:
            test: ['CMD', 'etcdctl', 'endpoint', 'health']
            interval: 30s
            timeout: 20s
            retries: 3

    minio:
        container_name: milvus-minio
        image: minio/minio:RELEASE.2023-03-20T20-16-18Z
        environment:
            MINIO_ACCESS_KEY: minioadmin
            MINIO_SECRET_KEY: minioadmin
        ports:
            - '9001:9001'
            - '9000:9000'
        volumes:
            - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
        command: minio server /minio_data --console-address ":9001"
        healthcheck:
            test:
                ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
            interval: 30s
            timeout: 20s
            retries: 3

    standalone:
        container_name: milvus-standalone
        image: milvusdb/milvus:v2.4.5
        command: ['milvus', 'run', 'standalone']
        security_opt:
            - seccomp:unconfined
        environment:
            ETCD_ENDPOINTS: etcd:2379
            MINIO_ADDRESS: minio:9000
        volumes:
            - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:9091/healthz']
            interval: 30s
            start_period: 90s
            timeout: 20s
            retries: 3
        ports:
            - '19530:19530'
            - '9091:9091'
        depends_on:
            - 'etcd'
            - 'minio'

    attu:
        container_name: milvus-attu
        image: zilliz/attu:v2.4
        ports:
            - '3000:3000'
        environment:
            - MILVUS_URL=milvus-standalone:19530
        depends_on:
            - standalone
        restart: unless-stopped

networks:
    default:
        name: milvus
